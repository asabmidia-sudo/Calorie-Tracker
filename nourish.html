const storage = {
  async get(key) {
    try {
      const v = localStorage.getItem(key);
      return v ? { key, value: v } : null;
    } catch { return null; }
  },
  async set(key, value) {
    try { localStorage.setItem(key, value); return { key, value }; } catch { return null; }
  },
  async delete(key) {
    try { localStorage.removeItem(key); return { key, deleted: true }; } catch { return null; }
  }
};

async function analyzeFood(base64Image) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{
        role: "user",
        content: [
          { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64Image } },
          { type: "text", text: `You are a Filipino food and nutrition expert. Identify all food items in this photo, with deep knowledge of Filipino cuisine and cooking methods. Consider:
- Filipino cooking styles: prito (fried), inihaw (grilled), nilaga (boiled), ginataan (coconut milk), sinigang (sour broth), guisado (sautéed), adobo (vinegar-braised), kinilaw (ceviche-style), pinausukan (smoked), halabos (steamed in own juices).
- Common Filipino meals: silog combos (tapa/longganisa/tocino + sinangag + itlog), ulam-and-rice pairings, merienda snacks.
- Estimate portion size realistically for a Filipino serving (e.g. rice is often 1-1.5 cups per meal, ulam served per cup or piece).
- If it's a carinderia/turo-turo style, estimate each component separately.
- Account for cooking oil, coconut milk, soy sauce, vinegar, sugar, and bagoong that affect calorie counts in Filipino cooking.
- Recognize Filipino street foods (kwek-kwek, isaw, fish ball, banana cue, turon, etc.), kakanin (puto, kutsinta, bibingka, suman), and desserts (halo-halo, leche flan, buko salad).
Respond ONLY with a JSON array, no markdown, no backticks, no preamble. Each element: {"name":"string","calories":number,"protein":number,"carbs":number,"fat":number}. Use the Filipino dish name where applicable (e.g. "Sinigang na Baboy" not "Pork sour soup"). If no food is visible, return an empty array [].` }
        ]
      }]
    })
  });
  const data = await response.json();
  const text = data.content.map(c => c.type === "text" ? c.text : "").join("");
  return JSON.parse(text.replace(/```json|```/g, "").trim());
}

function CalorieRing({ consumed, goal, size = 220 }) {
  const stroke = 10, radius = (size - stroke * 2) / 2;
  const circ = 2 * Math.PI * radius;
  const pct = Math.min(consumed / goal, 1.5);
  const offset = circ - pct * circ;
  const over = consumed > goal;
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={over?"#ff6b6b":"#b8f2a1"} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          style={{ transition: "stroke-dashoffset 0.7s cubic-bezier(.4,0,.2,1), stroke 0.3s" }} />
      </svg>
      <div style={{ position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center" }}>
        <span style={{ fontFamily:"'Playfair Display',serif",fontSize:44,fontWeight:700,color:over?"#ff6b6b":"#fff",lineHeight:1,transition:"color 0.3s" }}>{consumed}</span>
        <span style={{ fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"rgba(255,255,255,0.4)",letterSpacing:2,textTransform:"uppercase",marginTop:4 }}>of {goal} kcal</span>
      </div>
    </div>
  );
}

function MacroPill({ label, value, unit, color, goal }) {
  const pct = goal > 0 ? Math.min(value / goal, 1) : 0;
  const over = goal > 0 && value > goal;
  return (
    <div style={{ background:"rgba(255,255,255,0.04)",borderRadius:14,padding:"12px 8px",flex:1,textAlign:"center",border:"1px solid rgba(255,255,255,0.06)" }}>
      <div style={{ width:6,height:6,borderRadius:"50%",background:color,margin:"0 auto 8px",boxShadow:`0 0 10px ${color}55` }} />
      <div style={{ fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:over?"#ff6b6b":"#fff" }}>{value}<span style={{ fontSize:11,color:"rgba(255,255,255,0.35)",marginLeft:2 }}>{unit}</span></div>
      <div style={{ fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:1.5,textTransform:"uppercase",marginTop:2 }}>{label}</div>
      {goal > 0 && (<>
        <div style={{ width:"80%",height:3,borderRadius:2,background:"rgba(255,255,255,0.06)",margin:"8px auto 0",overflow:"hidden" }}>
          <div style={{ width:`${pct*100}%`,height:"100%",borderRadius:2,background:over?"#ff6b6b":color,transition:"width 0.5s cubic-bezier(.4,0,.2,1)" }} />
        </div>
        <div style={{ fontSize:9,color:"rgba(255,255,255,0.2)",marginTop:4 }}>{over?`+${value-goal}`:`${goal-value} left`} / {goal}{unit}</div>
      </>)}
    </div>
  );
}

}

function App() {
  const [entries, setEntries] = useState([]);

  const [customFat, setCustomFat] = useState("");
  const [showSettings, setShowSettings] = useState(false);
  const [goalInput, setGoalInput] = useState(String(DAILY_GOAL_DEFAULT));
  const [macroGoals, setMacroGoals] = useState(MACRO_DEFAULTS);
  const [macroInputs, setMacroInputs] = useState({protein:String(MACRO_DEFAULTS.protein),carbs:String(MACRO_DEFAULTS.carbs),fat:String(MACRO_DEFAULTS.fat)});
  const [loaded, setLoaded] = useState(false);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const searchRef = useRef(null);
  const [selectedCat, setSelectedCat] = useState("All");
  const [showCamera, setShowCamera] = useState(false);

  const canvasRef = useRef(null);
  const fileInputRef = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const res = await storage.get("calorie-data");
        if (res && res.value) {
          const data = JSON.parse(res.value);
          setEntries(data.entries || []);
          setGoal(data.goal || DAILY_GOAL_DEFAULT);
          setGoalInput(String(data.goal || DAILY_GOAL_DEFAULT));
          if (data.macroGoals) { setMacroGoals(data.macroGoals); setMacroInputs({protein:String(data.macroGoals.protein),carbs:String(data.macroGoals.carbs),fat:String(data.macroGoals.fat)}); }
        }
      } catch(e) {}
      setLoaded(true);
    })();
  }, []);

  const persist = useCallback(async (e,g,mg) => { try { await storage.set("calorie-data", JSON.stringify({entries:e,goal:g,macroGoals:mg})); } catch(err) {} }, []);
  useEffect(() => { if (loaded) persist(entries, goal, macroGoals); }, [entries, goal, macroGoals, loaded]);
  useEffect(() => { if (showAdd && searchRef.current) searchRef.current.focus(); }, [showAdd]);

  const startCamera = useCallback(async () => {
    setShowCamera(true); setCapturedImage(null); setAiResults(null); setAiError(null);
    try { const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:960}}}); streamRef.current = s; if(videoRef.current) videoRef.current.srcObject = s; }
    catch(e) { setAiError("Could not access camera. Try uploading a photo instead."); }
  }, []);
  const stopCamera = useCallback(() => { if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;} }, []);
  const closeCamera = useCallback(() => { stopCamera(); setShowCamera(false); setCapturedImage(null); setAiResults(null); setAiError(null); setAnalyzing(false); }, [stopCamera]);
  const capturePhoto = useCallback(() => {
    if(!videoRef.current||!canvasRef.current) return;
    const v=videoRef.current, c=canvasRef.current; c.width=v.videoWidth; c.height=v.videoHeight;
    c.getContext("2d").drawImage(v,0,0);
    const d=c.toDataURL("image/jpeg",0.8); setCapturedImage({dataUrl:d,base64:d.split(",")[1]}); stopCamera();
  }, [stopCamera]);
  const handleFileUpload = useCallback(e => {
    const f=e.target.files?.[0]; if(!f) return;
    setShowCamera(true); setCapturedImage(null); setAiResults(null); setAiError(null);
    const r=new FileReader(); r.onload=()=>{const d=r.result; setCapturedImage({dataUrl:d,base64:d.split(",")[1]});}; r.readAsDataURL(f); e.target.value="";
  }, []);
  const analyzePhoto = useCallback(async () => {
    if(!capturedImage) return; setAnalyzing(true); setAiError(null);
    try { const items=await analyzeFood(capturedImage.base64); if(!Array.isArray(items)||items.length===0) setAiError("No food items detected. Try a clearer photo."); else setAiResults(items); }
    catch(e) { setAiError("Analysis failed. Please try again or add manually."); } setAnalyzing(false);
  }, [capturedImage]);
  const addAiItem = useCallback(item => {
    setEntries(p=>[...p,{...item,calories:Math.round(item.calories),protein:Math.round(item.protein||0),carbs:Math.round(item.carbs||0),fat:Math.round(item.fat||0),id:uid(),date:selectedDate,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}]);
    setAiResults(p=>p?.filter(r=>r!==item)||null);
  }, [selectedDate]);
  const addAllAiItems = useCallback(() => {
    if(!aiResults) return; const now=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    setEntries(p=>[...p,...aiResults.map(item=>({...item,calories:Math.round(item.calories),protein:Math.round(item.protein||0),carbs:Math.round(item.carbs||0),fat:Math.round(item.fat||0),id:uid(),date:selectedDate,time:now}))]);
    closeCamera(); setShowAdd(false);
  }, [aiResults,selectedDate,closeCamera]);

  const todayEntries = entries.filter(e=>e.date===selectedDate);
  const totalCal = todayEntries.reduce((s,e)=>s+e.calories,0);
  const totalProtein = todayEntries.reduce((s,e)=>s+(e.protein||0),0);
  const totalCarbs = todayEntries.reduce((s,e)=>s+(e.carbs||0),0);
  const totalFat = todayEntries.reduce((s,e)=>s+(e.fat||0),0);
  const remaining = goal - totalCal;

  const addEntry = food => { setEntries(p=>[...p,{...food,id:uid(),date:selectedDate,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}]); setShowAdd(false); setSearch(""); };
  const addCustom = () => { if(!customName||!customCal) return; addEntry({name:customName,calories:Math.round(Number(customCal)),protein:Math.round(Number(customProtein)||0),carbs:Math.round(Number(customCarbs)||0),fat:Math.round(Number(customFat)||0)}); setCustomName("");setCustomCal("");setCustomProtein("");setCustomCarbs("");setCustomFat(""); };
  const removeEntry = id => { setEntries(p=>p.filter(e=>e.id!==id)); setDeleteConfirm(null); };

  const filtered = FOOD_SUGGESTIONS.filter(f=>{const ms=f.name.toLowerCase().includes(search.toLowerCase()); const mc=selectedCat==="All"||f.cat===selectedCat; return ms&&mc;});
  const CATEGORIES = ["All","Rice","Ulam","Sabaw","Inihaw","Prito","Guisado","Pancit","Silog","Merienda","Drinks","Extras"];
  const shiftDate = d => { const dt=new Date(selectedDate); dt.setDate(dt.getDate()+d); setSelectedDate(dt.toISOString().split("T")[0]); };
  const formatDate = str => { if(str===getToday()) return "Today"; const d=new Date(str+"T12:00:00"); return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}); };
  const last7 = Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));const k=d.toISOString().split("T")[0];return{date:k,total:entries.filter(e=>e.date===k).reduce((s,e)=>s+e.calories,0),label:d.toLocaleDateString("en-US",{weekday:"narrow"})};});
  const maxChart = Math.max(goal,...last7.map(d=>d.total),1);

  const inputStyle = {fontFamily:"'DM Sans',sans-serif",fontSize:14,padding:"10px 14px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,color:"#fff",outline:"none",width:"100%",boxSizing:"border-box"};
  const btnStyle = {fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:600,border:"none",borderRadius:12,cursor:"pointer",padding:"12px 24px",transition:"all 0.2s"};

  if (!loaded) return <div style={{minHeight:"100vh",background:"#0a0a0a",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:"rgba(255,255,255,0.3)",fontFamily:"'DM Sans',sans-serif"}}>Loading...</div></div>;

  return (
    <>
      <canvas ref={canvasRef} style={{display:"none"}} />
      <input ref={fileInputRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handleFileUpload} />
      <div style={{minHeight:"100vh",background:"linear-gradient(165deg,#0a0a0a 0%,#111118 40%,#0d1117 100%)",color:"#fff",fontFamily:"'DM Sans',sans-serif",maxWidth:480,margin:"0 auto",position:"relative",overflow:"hidden"}}>
        <div style={{position:"fixed",top:-120,right:-120,width:300,height:300,background:"radial-gradient(circle,rgba(184,242,161,0.06) 0%,transparent 70%)",pointerEvents:"none"}} />

        {/* Header */}
        <div style={{padding:"24px 24px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:900,margin:0,letterSpacing:-0.5}}>Nourish</h1>
            <p style={{margin:0,fontSize:11,color:"rgba(255,255,255,0.3)",letterSpacing:2,textTransform:"uppercase"}}>Calorie Tracker</p>
          </div>
          <button onClick={()=>{setShowSettings(!showSettings);setGoalInput(String(goal));setMacroInputs({protein:String(macroGoals.protein),carbs:String(macroGoals.carbs),fat:String(macroGoals.fat)});}}
            style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"rgba(255,255,255,0.5)",fontSize:18,transition:"all 0.2s"}}>⚙</button>
        </div>

        {/* Settings */}
        {showSettings && (
          <div style={{margin:"16px 24px",padding:20,background:"rgba(255,255,255,0.04)",borderRadius:16,border:"1px solid rgba(255,255,255,0.06)"}}>
            <label style={{fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:1.5,textTransform:"uppercase"}}>Daily Calorie Goal</label>
            <div style={{display:"flex",gap:10,marginTop:8,marginBottom:18}}>
              <input type="number" value={goalInput} onChange={e=>setGoalInput(e.target.value)} style={inputStyle} />
            </div>
            <label style={{fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:1.5,textTransform:"uppercase"}}>Macro Goals (grams)</label>
            <div style={{display:"flex",gap:8,marginTop:8}}>
              {[["protein","#a1d2f2","Protein"],["carbs","#f2d1a1","Carbs"],["fat","#f2a1c8","Fat"]].map(([k,c,l])=>(
                <div key={k} style={{flex:1}}>
                  <div style={{fontSize:9,color:c,letterSpacing:1,textTransform:"uppercase",marginBottom:4,display:"flex",alignItems:"center",gap:4}}>
                    <div style={{width:5,height:5,borderRadius:"50%",background:c}}/>{l}
                  </div>
                  <input type="number" value={macroInputs[k]} onChange={e=>setMacroInputs(p=>({...p,[k]:e.target.value}))} style={inputStyle} placeholder="g" />
                </div>
              ))}
            </div>
            {(()=>{const mp=Number(macroInputs.protein)||0,mc=Number(macroInputs.carbs)||0,mf=Number(macroInputs.fat)||0,mk=mp*4+mc*4+mf*9;return mk>0?<div style={{fontSize:11,color:"rgba(255,255,255,0.25)",marginTop:8,textAlign:"center"}}>Macro total ≈ {mk} kcal{Math.abs(mk-(Number(goalInput)||0))>100&&<span style={{color:"rgba(255,167,38,0.6)",marginLeft:6}}>({mk>(Number(goalInput)||0)?"+":""}{mk-(Number(goalInput)||0)} vs cal goal)</span>}</div>:null;})()}
            <button onClick={()=>{setGoal(Number(goalInput)||2000);setMacroGoals({protein:Math.max(0,Math.round(Number(macroInputs.protein)))||0,carbs:Math.max(0,Math.round(Number(macroInputs.carbs)))||0,fat:Math.max(0,Math.round(Number(macroInputs.fat)))||0});setShowSettings(false);}}
              style={{...btnStyle,background:"#b8f2a1",color:"#0a0a0a",whiteSpace:"nowrap",width:"100%",marginTop:16}}>Save Goals</button>
          </div>
        )}

        {/* Date nav */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:20,padding:"20px 24px 8px"}}>
          <button onClick={()=>shiftDate(-1)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.4)",fontSize:20,cursor:"pointer",padding:8}}>‹</button>
          <span style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,minWidth:140,textAlign:"center"}}>{formatDate(selectedDate)}</span>
          <button onClick={()=>shiftDate(1)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.4)",fontSize:20,cursor:"pointer",padding:8}}>›</button>
        </div>

        <div style={{display:"flex",justifyContent:"center",padding:"16px 0"}}><CalorieRing consumed={totalCal} goal={goal} /></div>
        <div style={{textAlign:"center",marginBottom:16}}><span style={{fontSize:13,color:remaining>=0?"rgba(184,242,161,0.7)":"rgba(255,107,107,0.7)",fontWeight:500}}>{remaining>=0?`${remaining} kcal remaining`:`${Math.abs(remaining)} kcal over`}</span></div>
        <div style={{display:"flex",gap:10,padding:"0 24px",marginBottom:24}}>
          <MacroPill label="Protein" value={totalProtein} unit="g" color="#a1d2f2" goal={macroGoals.protein} />
          <MacroPill label="Carbs" value={totalCarbs} unit="g" color="#f2d1a1" goal={macroGoals.carbs} />
          <MacroPill label="Fat" value={totalFat} unit="g" color="#f2a1c8" goal={macroGoals.fat} />
        </div>

        {/* 7-day chart */}
        <div style={{padding:"0 24px",marginBottom:24}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:10}}>Last 7 Days</div>
          <div style={{display:"flex",gap:6,alignItems:"flex-end",height:60}}>
            {last7.map((d,i)=>{const h=Math.max((d.total/maxChart)*50,2);const sel=d.date===selectedDate;const ov=d.total>goal;return(
              <div key={i} style={{flex:1,textAlign:"center",cursor:"pointer"}} onClick={()=>setSelectedDate(d.date)}>
                <div style={{height:h,borderRadius:4,background:sel?(ov?"#ff6b6b":"#b8f2a1"):(ov?"rgba(255,107,107,0.3)":"rgba(255,255,255,0.1)"),transition:"all 0.3s",margin:"0 auto",width:"70%"}} />
                <div style={{fontSize:9,marginTop:4,color:sel?"rgba(255,255,255,0.7)":"rgba(255,255,255,0.2)",fontWeight:sel?600:400}}>{d.label}</div>
              </div>);})}
          </div>
        </div>

        {/* Food log */}
        <div style={{padding:"0 24px 120px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{fontSize:10,color:"rgba(255,255,255,0.25)",letterSpacing:1.5,textTransform:"uppercase"}}>Food Log</span>
            <span style={{fontSize:11,color:"rgba(255,255,255,0.2)"}}>{todayEntries.length} item{todayEntries.length!==1?"s":""}</span>
          </div>
          {todayEntries.length===0?<div style={{textAlign:"center",padding:"40px 20px",color:"rgba(255,255,255,0.15)",fontSize:13}}>No entries yet. Tap + to add food or snap a photo.</div>:
            todayEntries.map((e,i)=>(
              <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",marginBottom:8,background:"rgba(255,255,255,0.03)",borderRadius:14,border:"1px solid rgba(255,255,255,0.05)",animation:`fadeSlideIn 0.3s ease ${i*0.05}s both`}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:500,color:"rgba(255,255,255,0.85)"}}>{e.name}</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.25)",marginTop:2}}>{e.time} · P:{e.protein||0}g · C:{e.carbs||0}g · F:{e.fat||0}g</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <span style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:"#b8f2a1"}}>{e.calories}</span>
                  {deleteConfirm===e.id?<button onClick={()=>removeEntry(e.id)} style={{background:"#ff6b6b",border:"none",borderRadius:8,color:"#fff",fontSize:10,padding:"4px 10px",cursor:"pointer",fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>Delete?</button>
                  :<button onClick={()=>setDeleteConfirm(e.id)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.15)",fontSize:16,cursor:"pointer",padding:"2px 6px"}}>×</button>}
                </div>
              </div>))}
        </div>

        {/* FABs */}
        <div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",display:"flex",gap:14,alignItems:"center",zIndex:100}}>
          <button onClick={()=>fileInputRef.current?.click()} style={{width:48,height:48,borderRadius:"50%",background:"rgba(255,255,255,0.08)",backdropFilter:"blur(10px)",border:"1px solid rgba(255,255,255,0.12)",color:"#b8f2a1",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#b8f2a1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </button>
          <button onClick={()=>setShowAdd(true)} style={{width:60,height:60,borderRadius:"50%",background:"linear-gradient(135deg,#b8f2a1,#7ecba1)",border:"none",color:"#0a0a0a",fontSize:28,fontWeight:300,cursor:"pointer",boxShadow:"0 4px 24px rgba(184,242,161,0.3)",display:"flex",alignItems:"center",justifyContent:"center",transition:"transform 0.2s"}}>+</button>
          <button onClick={startCamera} style={{width:48,height:48,borderRadius:"50%",background:"rgba(255,255,255,0.08)",backdropFilter:"blur(10px)",border:"1px solid rgba(255,255,255,0.12)",color:"#a1d2f2",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}>
            <CameraIcon size={20} color="#a1d2f2" />
          </button>
        </div>

        {/* Add food modal */}
        {showAdd && (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(12px)",zIndex:200,display:"flex",flexDirection:"column",animation:"fadeIn 0.25s ease"}} onClick={e=>{if(e.target===e.currentTarget){setShowAdd(false);setSearch("");setSelectedCat("All");}}}>
            <div style={{marginTop:"auto",background:"#111118",borderRadius:"24px 24px 0 0",padding:"24px 24px 40px",maxHeight:"85vh",overflow:"auto",border:"1px solid rgba(255,255,255,0.06)",borderBottom:"none"}}>
              <div style={{width:36,height:4,borderRadius:2,background:"rgba(255,255,255,0.15)",margin:"0 auto 20px"}} />
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,margin:"0 0 4px"}}>Add Food</h2>
              <p style={{margin:"0 0 14px",fontSize:11,color:"rgba(255,255,255,0.25)"}}>Filipino dishes & more</p>
              <input ref={searchRef} type="text" placeholder="Search dishes... (e.g. adobo, sinigang)" value={search} onChange={e=>setSearch(e.target.value)} style={{...inputStyle,marginBottom:10}} />
              <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:10,marginBottom:8,scrollbarWidth:"none"}}>
                {CATEGORIES.map(cat=><button key={cat} onClick={()=>setSelectedCat(cat)} style={{padding:"6px 14px",borderRadius:20,fontSize:11,fontWeight:600,fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap",cursor:"pointer",border:selectedCat===cat?"1px solid rgba(184,242,161,0.4)":"1px solid rgba(255,255,255,0.08)",background:selectedCat===cat?"rgba(184,242,161,0.12)":"rgba(255,255,255,0.03)",color:selectedCat===cat?"#b8f2a1":"rgba(255,255,255,0.35)",transition:"all 0.2s"}}>{cat}</button>)}
              </div>
              <div style={{maxHeight:220,overflow:"auto",marginBottom:20}}>
                {filtered.length===0?<div style={{textAlign:"center",padding:"20px 0",color:"rgba(255,255,255,0.15)",fontSize:12}}>No matches.</div>:
                  filtered.map((f,i)=><button key={i} onClick={()=>addEntry(f)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"11px 14px",marginBottom:4,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:12,cursor:"pointer",color:"#fff",fontFamily:"'DM Sans',sans-serif",fontSize:13,textAlign:"left",transition:"background 0.15s"}}>
                    <div><span>{f.name}</span><span style={{fontSize:9,color:"rgba(255,255,255,0.2)",marginLeft:6}}>{f.cat}</span></div>
                    <span style={{color:"#b8f2a1",fontWeight:600,fontFamily:"'Playfair Display',serif",flexShrink:0,marginLeft:8}}>{f.calories}</span>
                  </button>)}
              </div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:10}}>Custom Entry</div>
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <input placeholder="Food name" value={customName} onChange={e=>setCustomName(e.target.value)} style={{...inputStyle,flex:2}} />
                <input placeholder="Kcal" type="number" value={customCal} onChange={e=>setCustomCal(e.target.value)} style={{...inputStyle,flex:1}} />
              </div>
              <div style={{display:"flex",gap:8,marginBottom:16}}>
                <input placeholder="Protein (g)" type="number" value={customProtein} onChange={e=>setCustomProtein(e.target.value)} style={inputStyle} />
                <input placeholder="Carbs (g)" type="number" value={customCarbs} onChange={e=>setCustomCarbs(e.target.value)} style={inputStyle} />
                <input placeholder="Fat (g)" type="number" value={customFat} onChange={e=>setCustomFat(e.target.value)} style={inputStyle} />
              </div>
              <button onClick={addCustom} disabled={!customName||!customCal} style={{...btnStyle,width:"100%",background:customName&&customCal?"linear-gradient(135deg,#b8f2a1,#7ecba1)":"rgba(255,255,255,0.06)",color:customName&&customCal?"#0a0a0a":"rgba(255,255,255,0.2)"}}>Add Custom Food</button>
            </div>
          </div>
        )}

        {/* Camera modal */}
        {showCamera && (
          <div style={{position:"fixed",inset:0,background:"#0a0a0a",zIndex:300,display:"flex",flexDirection:"column",animation:"fadeIn 0.2s ease"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px",borderBottom:"1px solid rgba(255,255,255,0.06)",flexShrink:0}}>
              <button onClick={closeCamera} style={{background:"none",border:"none",color:"rgba(255,255,255,0.6)",fontSize:14,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:500}}>Cancel</button>
              <span style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:"#fff"}}>{analyzing?"Analyzing...":aiResults?"Results":"Snap Your Meal"}</span>
              <div style={{width:50}} />
            </div>
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
              {!capturedImage?<>
                <video ref={videoRef} autoPlay playsInline muted style={{width:"100%",height:"100%",objectFit:"cover",position:"absolute",inset:0}} />
                <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,rgba(0,0,0,0.4) 0%,transparent 25%,transparent 75%,rgba(0,0,0,0.6) 100%)",pointerEvents:"none"}} />
                <div style={{position:"absolute",width:"75%",aspectRatio:"4/3",border:"2px solid rgba(184,242,161,0.3)",borderRadius:20,pointerEvents:"none"}} />
                <div style={{position:"absolute",bottom:20,left:0,right:0,textAlign:"center",fontSize:12,color:"rgba(255,255,255,0.35)"}}>Point at your food and tap the shutter</div>
                {aiError&&<div style={{position:"absolute",bottom:60,left:20,right:20,background:"rgba(255,107,107,0.15)",border:"1px solid rgba(255,107,107,0.3)",borderRadius:12,padding:"12px 16px",textAlign:"center",fontSize:13,color:"#ff6b6b"}}>{aiError}</div>}
              </>:<>
                <img src={capturedImage.dataUrl} alt="Food" style={{width:"100%",height:"100%",objectFit:"cover",position:"absolute",inset:0}} />
                <div style={{position:"absolute",inset:0,background:analyzing?"rgba(0,0,0,0.6)":"rgba(0,0,0,0.3)",transition:"background 0.3s"}} />
                {analyzing&&<div style={{position:"absolute",display:"flex",flexDirection:"column",alignItems:"center",gap:16}}>
                  <div style={{width:64,height:64,borderRadius:"50%",background:"rgba(184,242,161,0.1)",border:"2px solid rgba(184,242,161,0.3)",display:"flex",alignItems:"center",justifyContent:"center",animation:"breathe 2s ease-in-out infinite"}}><CameraIcon size={28} color="#b8f2a1"/></div>
                  <ScanningDots /><span style={{fontSize:13,color:"rgba(255,255,255,0.5)"}}>Identifying food items...</span>
                </div>}
              </>}
            </div>
            <div style={{padding:"20px 24px 36px",background:"linear-gradient(to top,#0a0a0a,rgba(10,10,10,0.95))",flexShrink:0}}>
              {!capturedImage&&!aiResults&&<div style={{display:"flex",justifyContent:"center",gap:20,alignItems:"center"}}>
                <button onClick={()=>{stopCamera();fileInputRef.current?.click();}} style={{width:44,height:44,borderRadius:"50%",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.5)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                </button>
                <button onClick={capturePhoto} style={{width:72,height:72,borderRadius:"50%",background:"none",border:"3px solid #b8f2a1",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>
                  <div style={{width:58,height:58,borderRadius:"50%",background:"#b8f2a1"}} />
                </button>
                <div style={{width:44,height:44}} />
              </div>}
              {capturedImage&&!aiResults&&!analyzing&&<div>
                {aiError&&<div style={{background:"rgba(255,107,107,0.1)",border:"1px solid rgba(255,107,107,0.2)",borderRadius:12,padding:"12px 16px",textAlign:"center",fontSize:13,color:"#ff6b6b",marginBottom:12}}>{aiError}</div>}
                <div style={{display:"flex",gap:12}}>
                  <button onClick={()=>{setCapturedImage(null);setAiError(null);startCamera();}} style={{...btnStyle,flex:1,background:"rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.6)"}}>Retake</button>
                  <button onClick={analyzePhoto} style={{...btnStyle,flex:2,background:"linear-gradient(135deg,#b8f2a1,#7ecba1)",color:"#0a0a0a",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Identify Food
                  </button>
                </div>
              </div>}
              {aiResults&&aiResults.length>0&&<div>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:10}}>Detected {aiResults.length} item{aiResults.length!==1?"s":""}</div>
                <div style={{maxHeight:200,overflow:"auto",marginBottom:14}}>
                  {aiResults.map((item,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",marginBottom:6,background:"rgba(184,242,161,0.06)",border:"1px solid rgba(184,242,161,0.12)",borderRadius:12,animation:`fadeSlideIn 0.3s ease ${i*0.1}s both`}}>
                    <div style={{flex:1}}><div style={{fontSize:14,fontWeight:500,color:"#fff"}}>{item.name}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2}}>P:{item.protein||0}g · C:{item.carbs||0}g · F:{item.fat||0}g</div></div>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:"#b8f2a1"}}>{Math.round(item.calories)}</span>
                      <button onClick={()=>addAiItem(item)} style={{background:"rgba(184,242,161,0.15)",border:"1px solid rgba(184,242,161,0.25)",borderRadius:8,color:"#b8f2a1",fontSize:16,width:30,height:30,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                    </div>
                  </div>)}
                </div>
                <div style={{display:"flex",gap:12}}>
                  <button onClick={closeCamera} style={{...btnStyle,flex:1,background:"rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.6)"}}>Done</button>
                  <button onClick={addAllAiItems} style={{...btnStyle,flex:2,background:"linear-gradient(135deg,#b8f2a1,#7ecba1)",color:"#0a0a0a"}}>Add All ({aiResults.reduce((s,i)=>s+Math.round(i.calories),0)} kcal)</button>
                </div>
              </div>}
              {aiResults&&aiResults.length===0&&<div style={{textAlign:"center"}}><button onClick={closeCamera} style={{...btnStyle,background:"rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.6)"}}>Close</button></div>}
            </div>
          </div>
        )}

        <style dangerouslySetInnerHTML={{__html:`
          @keyframes fadeIn{from{opacity:0}to{opacity:1}}
          @keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
          @keyframes pulse{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}
          @keyframes breathe{0%,100%{transform:scale(1);opacity:0.8}50%{transform:scale(1.1);opacity:1}}
          input::placeholder{color:rgba(255,255,255,0.2)}
          input:focus{border-color:rgba(184,242,161,0.3)!important}
          ::-webkit-scrollbar{width:4px}
          ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
          *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        `}} />
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
